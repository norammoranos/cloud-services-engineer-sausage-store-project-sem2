---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-conf
  namespace: {{ .Release.Namespace }}
data:
  postgres_uri: {{ .Values.env.postgresUri | quote }}
  report_path: {{ .Values.env.reportPath | quote }}
  log_path: {{ .Values.env.logPath | quote }}
  vault_host: {{ required "global.vault.host is required for backend Vault integration" .Values.global.vault.host | quote }}
  vault_scheme: {{ .Values.global.vault.scheme | quote }}
  vault_port: {{ .Values.global.vault.port | quote }}
