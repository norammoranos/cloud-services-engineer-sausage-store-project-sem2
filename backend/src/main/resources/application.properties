spring.application.name=sausage-store
management.security.enabled=false

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

spring.cloud.vault.enabled=true
spring.cloud.vault.token=${SPRING_CLOUD_VAULT_TOKEN}
spring.cloud.vault.scheme=${SPRING_CLOUD_VAULT_SCHEME:http}
spring.cloud.vault.host=${SPRING_CLOUD_VAULT_HOST}
spring.cloud.vault.port=${SPRING_CLOUD_VAULT_PORT:8200}
spring.cloud.vault.kv.enabled=true
spring.config.import=vault://kv/${spring.application.name}

# Enable Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#H2 settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
management.endpoint.prometheus.enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
